name: OpenG2P Odoo Package Dockers build

on:
  workflow_dispatch:
    inputs:
      packageName:
        description: 'Package Name'
        required: true
        default: 'social-registry/17.0-develop'
        type: choice
        options:
          - social-registry/*
          - social-registry/17.0-develop
          - social-registry/1.2.0
          - social-registry/1.2.1
          - social-registry/1.2.2
          - social-registry/1.2
          - social-registry/1.3

jobs:
  docker-build:
    runs-on: ubuntu-latest
    env:
      NAMESPACE: ${{ secrets.docker_hub_organisation || 'openg2p' }}
      SOCIAL_REGISTRY_DOCKER_IMAGE_NAME: openg2p-social-registry-ati
      PBMS_DOCKER_IMAGE_NAME: openg2p-pbms-ati
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Docker Login
        run: |
          echo "${{ secrets.docker_hub_token }}" | docker login -u ${{ secrets.docker_hub_actor }} --password-stdin || echo "::warning::Failed to Login to dockerhub"

      - name: Docker build & push
        run: |
          cd ..

          packageNameInput=${{ inputs.packageName }}

          if [ ! -f "./openg2p-ati/.github/docker_packages/${packageNameInput}.txt" ]; then
            echo "Could not find the package specified." 1>&2;
            exit 1;
          fi

          for package in ./openg2p-ati/.github/docker_packages/${packageNameInput}.txt; do
            export IMAGE_ID=$(sed -n '1p' $package)

            if [[ $IMAGE_ID == "#!"* ]]; then
              export IMAGE_ID=${IMAGE_ID#"#!"}
            else
              export DOCKER_TAG=$(basename "${package}" ".txt")
              if [[ $packageNameInput == pbms* ]]; then
                export IMAGE_ID=$NAMESPACE/$PBMS_DOCKER_IMAGE_NAME:$DOCKER_TAG
              elif [[ $packageNameInput == social-registry* ]]; then
                export IMAGE_ID=$NAMESPACE/$SOCIAL_REGISTRY_DOCKER_IMAGE_NAME:$DOCKER_TAG
              fi
            fi

            export ODOO_BASE_VERSION=$(sed -n '2p' $package)
            export ODOO_BASE_VERSION=${ODOO_BASE_VERSION#"#!"}
            export OCA_DEPENDENCY_VERSION=$(echo $ODOO_BASE_VERSION | awk -F'.' '{print $1 "." $2}')

            ./openg2p-ati/.github/docker_packaging/packaging/package.sh ${package}
            mv tmpdir ./openg2p-ati/.github/docker_packaging/packaging
            cd ./openg2p-ati/.github/docker_packaging/packaging
            docker build . \
              --build-arg BASE_VERSION=${ODOO_BASE_VERSION} \
              --file Dockerfile \
              --tag $IMAGE_ID
            docker push $IMAGE_ID
          done
